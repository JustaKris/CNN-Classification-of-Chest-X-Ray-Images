# DEPRECATED: Use deploy-azure.yml instead.
# This workflow is kept for reference only.
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: "[DEPRECATED] Build and deploy container app to Azure Web App - Chest-XRay-Classification"

on:
  # push:
  #   branches:
  #     - project-modernization
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: index.docker.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8476AA456E3D462CB485FC0E78B727F1 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_FD25845F15894FB89A38C64034B4CA77 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: index.docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8476AA456E3D462CB485FC0E78B727F1 }}/justakris/chest-xray-classification-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F451329993554799B3D0F529440372A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FB76946A8E494535BA42241023721C52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DAFA30B5AE9E47B596D86876F862241C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Chest-XRay-Classification'
          slot-name: 'Production'
          images: 'index.docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8476AA456E3D462CB485FC0E78B727F1 }}/justakris/chest-xray-classification-app:${{ github.sha }}'
          