# MkDocs Configuration for Chest X-Ray Image Classification Project

# Site metadata
site_name: Chest X-Ray Image Classification
site_description: Deep learning application for classifying chest X-ray images using CNN and Transfer Learning with Grad-CAM explainability
site_author: Kristiyan Bonev
site_url: https://justakris.github.io/CNN-Classification-of-Chest-X-Ray-Images/

# Repository information
repo_name: JustaKris/CNN-Classification-of-Chest-X-Ray-Images
repo_url: https://github.com/JustaKris/CNN-Classification-of-Chest-X-Ray-Images
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material

  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

  icon:
    repo: fontawesome/brands/github

# Navigation structure
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Developer Guide: dev-guide.md

  - Development:
      - Testing: development/testing.md
      - Code Style: development/code-style.md
      - Formatting: development/formatting.md
      - Linting: development/linting.md
      - Security: development/security.md
      - Logging: development/logging.md
      - Markdown Linting: development/markdown-linting.md

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: JustaKris
      repo: CNN-Classification-of-Chest-X-Ray-Images
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang: en

# Exclude patterns
exclude_docs: |
  copilot-artifacts/
  **/.git
  **/.venv
  **/__pycache__

# Copyright
copyright: Copyright &copy; 2025 Kristiyan Bonev

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JustaKris
